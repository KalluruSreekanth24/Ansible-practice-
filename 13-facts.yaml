- name: facts
  hosts: local
  connection: local
  tasks:
    - name: checking the fact of redhat
      ansible.builtin.dnf:
        name: nginx
        state: latest
      when ansible_os_family == "RedHat"
    - name: checking the fact of redhat
      ansible.builtin.apt:
        name: nginx
        state: latest
      when ansible_os_family == "Debian"